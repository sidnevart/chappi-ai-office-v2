# Eval Cases for idea-generator
# Generate ideas with evidence

eval_id: idea-generator-basic
skill: idea-generator
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: market-evidence
    name: "Market size with calculation"
    input:
      task: "generate_report"
    expected:
      - contains: "Market Size"
      - contains: "Method"
    timeout: 30
  - id: self-challenge
    name: "Self-challenge Q&A"
    input:
      task: "generate_report"
    expected:
      - contains: "Q"
      - contains: "A"
    timeout: 30
  - id: risk-matrix
    name: "Risk matrix"
    input:
      task: "generate_report"
    expected:
      - contains: "Risk"
      - contains: "Mitigation"
    timeout: 30
