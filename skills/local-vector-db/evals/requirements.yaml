# Eval for local-vector-db (unified knowledge system)

eval_id: local-vector-db-unified
skill: local-vector-db
description: "Единственная система знаний"
version: "2.0"

cases:
  - id: single-source
    name: "Единственная система знаний"
    input:
      task: "check_skill"
    expected:
      - contains: "ЕДИНСТВЕННАЯ"
      - contains: "единственная"
    timeout: 30

  - id: has-facts-table
    name: "Таблица facts"
    input:
      task: "check_skill"
    expected:
      - contains: "facts"
      - contains: "embedding"
      - contains: "entity_type"
    timeout: 30

  - id: has-feedback-table
    name: "Таблица feedback"
    input:
      task: "check_skill"
    expected:
      - contains: "feedback"
      - contains: "reaction"
      - contains: "preferences"
    timeout: 30

  - id: no-json-knowledge
    name: "Никаких JSON файлов"
    input:
      task: "check_skill"
    expected:
      - contains: "knowledge.json"
      - contains: "state.json"
      - contains: "feedback.json"
    timeout: 30

  - id: semantic-search
    name: "Семантический поиск"
    input:
      task: "check_skill"
    expected:
      - contains: "semantic"
      - contains: "search"
      - contains: "embedding"
    timeout: 30

  - id: cross-domain
    name: "Кросс-доменное использование"
    input:
      task: "check_skill"
    expected:
      - contains: "Cross-Domain"
      - contains: "cross-domain"
    timeout: 30

  - id: pipeline-integration
    name: "Интеграция в пайплайн"
    input:
      task: "check_skill"
    expected:
      - contains: "pipeline"
      - contains: "before research"
    timeout: 30
