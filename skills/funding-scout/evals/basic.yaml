# Eval Cases for Funding Scout

eval_id: funding-scout-basic
skill: funding-scout
description: "Basic functionality tests for funding search"
version: "1.0"

cases:
  - id: find-investors
    name: "Find investors for idea"
    input:
      idea: "AI team memory"
      stage: "Seed"
    expected:
      - json_output: true
      - has_fields: ["investors", "accelerators", "grants"]
      - investors_count: ">=3"
    timeout: 30

  - id: match-by-stage
    name: "Match investors by stage"
    input:
      idea: "Healthcare AI"
      stage: "Series A"
    expected:
      - has_fields: ["recommended_stage", "recommended_amount"]
    timeout: 30

  - id: find-accelerators
    name: "Find relevant accelerators"
    input:
      idea: "DevTools"
      stage: "Pre-seed"
    expected:
      - has_fields: ["accelerators"]
      - contains: "Y Combinator"
    timeout: 30

  - id: find-grants
    name: "Find grants"
    input:
      idea: "Russian AI"
      geography: "Russia"
    expected:
      - has_fields: ["grants"]
      - contains: "Сколково"
    timeout: 30
