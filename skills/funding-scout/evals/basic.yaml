# Eval Cases for funding-scout
# Find investors with track record

eval_id: funding-scout-basic
skill: funding-scout
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: investor-track-record
    name: "Investor track record"
    input:
      task: "generate_report"
    expected:
      - contains: "Track Record"
      - contains: "Portfolio"
    timeout: 30
  - id: check-size-verify
    name: "Check size verified"
    input:
      task: "generate_report"
    expected:
      - contains: "Check Size"
      - contains: "Source"
    timeout: 30
  - id: fit-score
    name: "Fit scoring"
    input:
      task: "generate_report"
    expected:
      - contains: "Fit Score"
      - contains: "/10"
    timeout: 30
