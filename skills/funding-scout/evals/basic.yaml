# Eval Cases for Funding Scout

eval_id: funding-scout-basic
skill: funding-scout
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: evidence-required
    name: "Every claim has source URL"
    input:
      task: "generate_report"
    expected:
      - contains: "Source:"
      - contains: "http"
      - has_fields: ["evidence"]
    timeout: 30

  - id: self-challenge
    name: "Self-challenge section exists"
    input:
      task: "generate_report"
    expected:
      - contains: "Self-Challenge"
      - contains: "Q:"
      - contains: "A:"
    timeout: 30

  - id: html-output
    name: "Generates HTML (not JSON) for humans"
    input:
      task: "generate_report"
    expected:
      - file_contains: "reports/html/funding-scout"
      - file_contains: "<!DOCTYPE html>"
    timeout: 30

  - id: confidence-levels
    name: "Confidence levels specified"
    input:
      task: "generate_report"
    expected:
      - contains: "Confidence:"
      - matches_regex: "High|Medium|Low"
    timeout: 30

  - id: calculation-method
    name: "Calculations show method"
    input:
      task: "generate_report"
    expected:
      - contains: "Method:"
      - contains: "Calculation"
    timeout: 30
