# Evals for financial-modeling
# Tests SKILL.md for required rules/sections

eval_id: financial-modeling-requirements
skill: financial-modeling
description: "Проверяет что скилл содержит все требования"
version: "3.1"

cases:
  - id: req-source-url
    name: "Скилл требует URL источника"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "Source:"
      - contains: "URL"
      - contains: "источник"
    timeout: 30
  - id: req-calculation
    name: "Скилл требует показывать метод"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "Method:"
      - contains: "Метод:"
      - contains: "Расчёт:"
    timeout: 30
  - id: req-confidence
    name: "Скилл требует уверенность"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "Confidence"
      - contains: "Уверенность"
      - contains: "High"
    timeout: 30
  - id: req-counter
    name: "Скилл требует контр-аргументы"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "counter"
      - contains: "Контр"
      - contains: "Против"
    timeout: 30
  - id: req-date
    name: "Скилл требует даты"
    input:
      task: "check_skill_requirements"
