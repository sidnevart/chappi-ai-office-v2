      - contains: "собственные"
      - contains: "LTV"
    timeout: 30
  - id: req-sections
    name: "Скилл требует разделы"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "Sources"
      - contains: "Источники"
      - contains: "Риски"
    timeout: 30
  - id: req-s3
    name: "Скилл требует S3"
    input:
      task: "check_skill_requirements"
