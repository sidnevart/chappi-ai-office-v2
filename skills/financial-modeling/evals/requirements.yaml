      - contains: "h2"
      - contains: "table"
    timeout: 30
  - id: req-styling
    name: "Скилл требует оформление"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "style"
      - contains: "CSS"
      - contains: "class="
    timeout: 30
  - id: req-russian
    name: "Скилл требует русский язык"
    input:
      task: "check_skill_requirements"
