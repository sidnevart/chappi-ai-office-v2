# Eval Cases for financial-modeling
# Build financial models with evidence

eval_id: financial-modeling-basic
skill: financial-modeling
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: assumptions
    name: "Assumptions with sources"
    input:
      task: "generate_report"
    expected:
      - contains: "Assumption"
      - contains: "Source"
    timeout: 30
  - id: unit-economics
    name: "Unit economics"
    input:
      task: "generate_report"
    expected:
      - contains: "LTV"
      - contains: "CAC"
    timeout: 30
  - id: sensitivity
    name: "Sensitivity analysis"
    input:
      task: "generate_report"
    expected:
      - contains: "Sensitivity"
      - contains: "-20%"
    timeout: 30
