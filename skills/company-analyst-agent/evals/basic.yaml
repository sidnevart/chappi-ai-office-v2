# Eval Cases for company-analyst-agent
# Orchestrate full pipeline

eval_id: company-analyst-agent-basic
skill: company-analyst-agent
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: all-artifacts
    name: "All 11 artifacts generated"
    input:
      task: "generate_report"
    expected:
      - file_exists: "companies"
      - file_exists: "strategies"
      - file_exists: "ideas"
      - file_exists: "russian_market"
      - file_exists: "funding"
      - file_exists: "financial_models"
      - file_exists: "pitches"
      - file_exists: "tech-specs"
    timeout: 30
  - id: s3-upload
    name: "All uploaded to S3"
    input:
      task: "generate_report"
    expected:
      - contains: "s3_url"
      - contains: "http"
    timeout: 30
  - id: telegram-sent
    name: "Telegram notification sent"
    input:
      task: "generate_report"
    expected:
      - contains: "Telegram"
      - contains: "sent"
    timeout: 30
