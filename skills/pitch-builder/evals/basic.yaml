# Eval Cases for pitch-builder
# Create pitch decks with evidence

eval_id: pitch-builder-basic
skill: pitch-builder
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: evidence-notes
    name: "Speaker notes with evidence"
    input:
      task: "generate_report"
    expected:
      - contains: "Evidence"
      - contains: "Source"
    timeout: 30
  - id: counter-argument
    name: "Counter-arguments addressed"
    input:
      task: "generate_report"
    expected:
      - contains: "Counter"
      - contains: "Q"
    timeout: 30
  - id: metrics
    name: "Key metrics shown"
    input:
      task: "generate_report"
    expected:
      - contains: "$"
      - contains: "%"
    timeout: 30
