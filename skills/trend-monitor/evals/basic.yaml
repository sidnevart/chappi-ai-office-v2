# Eval Cases for trend-monitor
# Track trends with evidence

eval_id: trend-monitor-basic
skill: trend-monitor
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: multi-source
    name: "Uses 3+ sources"
    input:
      task: "generate_report"
    expected:
      - contains: "Source"
      - contains: "http"
      - contains: "Method"
    timeout: 30
  - id: self-challenge
    name: "Self-challenge section"
    input:
      task: "generate_report"
    expected:
      - contains: "Self-Challenge"
      - contains: "Q"
    timeout: 30
  - id: html-output
    name: "Generates HTML"
    input:
      task: "generate_report"
    expected:
      - contains: "<!DOCTYPE html>"
      - contains: "<h1>"
    timeout: 30
  - id: confidence
    name: "Confidence levels"
    input:
      task: "generate_report"
    expected:
      - contains: "Confidence"
      - contains: "High"
    timeout: 30
