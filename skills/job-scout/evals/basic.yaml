# Eval Cases for job-scout
# Find jobs with verification

eval_id: job-scout-basic
skill: job-scout
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: salary-verify
    name: "Salary from 2+ sources"
    input:
      task: "generate_report"
    expected:
      - contains: "Salary"
      - contains: "Source 1"
      - contains: "Source 2"
    timeout: 30
  - id: company-research
    name: "Company research"
    input:
      task: "generate_report"
    expected:
      - contains: "Company"
      - contains: "Founded"
    timeout: 30
  - id: requirements-match
    name: "Requirements matched"
    input:
      task: "generate_report"
    expected:
      - contains: "Requirements"
      - contains: "Match"
    timeout: 30
