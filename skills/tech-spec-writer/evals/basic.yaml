# Eval Cases for tech-spec-writer
# Write tech specs with justification

eval_id: tech-spec-writer-basic
skill: tech-spec-writer
description: "Evidence-based functionality tests"
version: "2.0"

cases:
  - id: tech-choices
    name: "Technology choices justified"
    input:
      task: "generate_report"
    expected:
      - contains: "Why chosen"
      - contains: "Alternative"
    timeout: 30
  - id: security-model
    name: "Security threat model"
    input:
      task: "generate_report"
    expected:
      - contains: "Threat"
      - contains: "Mitigation"
    timeout: 30
  - id: performance
    name: "Performance benchmarks"
    input:
      task: "generate_report"
    expected:
      - contains: "Performance"
      - contains: "ms"
    timeout: 30
