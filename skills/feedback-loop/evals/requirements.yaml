# Evals for feedback-loop

eval_id: feedback-loop-basic
skill: feedback-loop
description: "Feedback loop tests"
version: "1.0"

cases:
  - id: has-reactions
    name: "Есть реакции"
    input:
      task: "check_skill"
    expected:
      - contains: "reaction"
      - contains: "👍"
      - contains: "👎"
    timeout: 30

  - id: has-comments
    name: "Есть обработка комментариев"
    input:
      task: "check_skill"
    expected:
      - contains: "comment"
      - contains: "parse"
    timeout: 30

  - id: has-preferences
    name: "Есть preferences"
    input:
      task: "check_skill"
    expected:
      - contains: "preferences"
      - contains: "config"
    timeout: 30

  - id: has-blacklist
    name: "Есть blacklist"
    input:
      task: "check_skill"
    expected:
      - contains: "blacklist"
      - contains: "block"
    timeout: 30

  - id: has-adaptation
    name: "Есть адаптация"
    input:
      task: "check_skill"
    expected:
      - contains: "adapt"
      - contains: "update"
      - contains: "adjust"
    timeout: 30
