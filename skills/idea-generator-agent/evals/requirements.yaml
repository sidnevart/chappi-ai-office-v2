      - contains: "Artifacts"
    timeout: 30
  - id: req-next
    name: "Скилл запускает следующего"
    input:
      task: "check_skill_requirements"
    expected:
      - contains: "next"
      - contains: "trigger"
      - contains: "следующий"
    timeout: 30
